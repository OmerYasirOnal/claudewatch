name: mac

on:
  push:
    branches: [main]
    paths:
      - 'mac/**'
      - 'backend/**'      # backend source ships inside the .app bundle
      - 'frontend/**'
      - '.github/workflows/mac-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mac/**'
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/mac-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: swift build + test
    # macos-15 is the first runner image with Swift 6.0 toolchain (Xcode 16).
    # mac/Package.swift declares `swift-tools-version: 6.0`; macos-14 ships
    # Swift 5.10 and fails to even parse the manifest.
    runs-on: macos-15
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16 (Swift 6.0 toolchain)
        run: |
          # macos-15 images preinstall multiple Xcodes; pick the newest 16.x.
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then
            sudo xcode-select -s "$XCODE"
          fi
          xcode-select -p
          swift --version

      - name: swift build (release)
        working-directory: mac
        run: swift build -c release

      - name: swift test
        working-directory: mac
        run: swift test
